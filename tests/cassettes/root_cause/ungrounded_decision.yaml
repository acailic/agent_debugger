    model: gpt-4
    content: "The weather in London is currently sunny with a high of 22°C."
    usage:
      input_tokens: 18
      output_tokens: 14
    duration_ms: 600

  - id: decision-1
    type: decision
    name: Ungrounded weather claim
    reasoning: "I recall that London weather in March is typically mild, so I'll provide a general answer."
    confidence: 0.3
    evidence: []
    evidence_event_ids: []
    chosen_action: "Report weather without verification"
    upstream_event_ids:
      - llm-resp-1

  - id: tool-call-1
    type: tool_call
    name: Attempt to verify weather
    tool_name: weather_api
    arguments:
      city: London
