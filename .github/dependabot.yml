version: 2

updates:
  # Python SDK
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - python

  # Node.js frontend
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - javascript

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
