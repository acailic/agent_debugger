services:
  api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./agent_debugger.db:/app/agent_debugger.db
    environment:
      - AGENT_DEBUGGER_ENABLED=true
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
