site_name: Peaky Peek
site_url: https://acailic.github.io/agent_debugger/
site_description: Local-first AI agent debugger with replay, failure memory, smart highlights, and drift detection
site_author: acailic
repo_url: https://github.com/acailic/agent_debugger
edit_uri: edit/main/docs-site/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - toc.follow
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/acailic/agent_debugger
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/peaky-peek/

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Installation: installation.md
  - Integrations: integrations.md
  - Architecture: architecture.md
  - API Reference: api-reference.md
  - Configuration: configuration.md
  - Contributing: contributing.md
