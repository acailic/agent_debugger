[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentdbg-server"
version = "0.1.0"
description = "Self-hosted server for Agent Debugger — FastAPI backend, SQLite/Postgres storage, SSE streaming, and React UI."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [
    { name = "acailic", email = "acailic@users.noreply.github.com" },
]
keywords = ["ai", "agents", "debugging", "tracing", "fastapi", "server", "observability"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Debuggers",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "agentdbg>=0.1.0",
    "fastapi>=0.100",
    "uvicorn[standard]>=0.20",
    "sqlalchemy[asyncio]>=2.0",
    "aiosqlite>=0.19",
    "alembic>=1.12",
]

[project.optional-dependencies]
cloud = [
    "asyncpg>=0.28",
    "redis[hiredis]>=5.0",
    "aiobotocore>=2.7",
    "bcrypt>=4.0",
]

[project.urls]
Homepage = "https://github.com/acailic/agent_debugger"
Repository = "https://github.com/acailic/agent_debugger"
Issues = "https://github.com/acailic/agent_debugger/issues"

[tool.hatch.build.targets.wheel]
packages = ["agent_debugger_sdk", "api", "auth", "collector", "redaction", "storage"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
