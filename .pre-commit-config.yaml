# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: ruff check .
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: ruff format --check .
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-fast
        name: pytest-fast
        entry: pytest tests/ -x --timeout=30 -q -k "not integration"
        language: system
        types: [python]
        pass_filenames: false

      - id: frontend-lint
        name: frontend lint
        entry: bash -c 'cd frontend && npx eslint src/ --max-warnings 0'
        language: system
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: frontend-typecheck
        name: frontend typecheck
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
